name: Query Module

on:
  push:
    branches: [main, develop]
    paths:
      - "cmd/query/**"
      - "schemas/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/query.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "cmd/query/**"
      - "schemas/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/query.yml"

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: "1.26"
          cache-dependency-path: |
            go.sum
            cmd/query/go.sum

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable pnpm
          corepack prepare pnpm@10.20.0 --activate

      - name: Wire the unreleased parent module
        run: go work init . ./cmd/query

      - name: Use the checked-out parent module
        run: go work edit -replace=github.com/flanksource/commons-db@v0.1.15=.

      - name: Install web dependencies
        run: make -C cmd/query ui-install

      - name: Lint
        run: make -C cmd/query lint

      - name: Test
        run: make -C cmd/query test

      - name: Build
        run: make -C cmd/query build
