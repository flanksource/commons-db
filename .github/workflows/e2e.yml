name: E2E Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "**.go"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "**.go"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
      - "go.mod"
      - "go.sum"

env:
  GO_VERSION: "1.26"

permissions: read-all

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.26"]
    timeout-minutes: 30

    # Exercises the embedded-postgres path on both platforms. The external-DB
    # path is covered by e2e-external, which needs a Linux-only service container.
    env:
      COMMONS_DB_EMBEDDED_TEST: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Docker (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # Docker is pre-installed on Ubuntu runners
          docker --version

      - name: Set up Docker (macOS)
        if: runner.os == 'macOS'
        run: |
          # Install Docker on macOS via Docker Desktop
          brew install docker docker-compose 2>/dev/null || true
          docker --version 2>/dev/null || echo "Docker will be installed via Colima"

      - name: Install dependencies
        run: |
          go mod download
          go mod verify

      - name: Build e2e tests
        run: |
          go test -c -o /dev/null ./e2e
        env:
          CGO_ENABLED: 1

      - name: Run E2E tests with Ginkgo
        run: |
          go run github.com/onsi/ginkgo/v2/ginkgo@v2.28.0 run -v --timeout=10m --poll-progress-after=1m ./e2e
        env:
          CGO_ENABLED: 1
        continue-on-error: false

      - name: Run unit tests for helpers
        run: |
          go test -v ./e2e/helpers/... -timeout 5m
        continue-on-error: false

      - name: Collect test coverage
        run: |
          go test -v ./e2e -coverprofile=coverage-e2e.out
          go tool cover -html=coverage-e2e.out -o coverage-e2e.html
        continue-on-error: true

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-coverage-${{ matrix.os }}
          path: coverage-e2e.*

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-test-results-${{ matrix.os }}
          path: |
            e2e-test-results.json
            e2e-test-results.xml

      - name: Lint e2e tests
        run: |
          go vet ./e2e/...
        continue-on-error: false

      - name: Check code formatting
        run: |
          go fmt ./e2e/...
        continue-on-error: false

  e2e-external:
    name: E2E and DB Tests (external postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # COMMONS_DB_URL names the maintenance database; COMMONS_DB_CREATE defaults
    # to true, so each test carves out and drops its own database on this server.
    env:
      COMMONS_DB_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
      CGO_ENABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: go.sum

      - name: Run E2E tests with verbose output
        run: |
          go run github.com/onsi/ginkgo/v2/ginkgo@v2.28.0 run -v -r --timeout=10m --poll-progress-after=1m ./e2e

      - name: Run DB integration tests
        run: go test ./migrate/... ./query/... ./db/... -timeout 15m

      - name: Assert no scratch databases leaked
        run: |
          leaked=$(psql "$COMMONS_DB_URL" -tAc \
            "SELECT count(*) FROM pg_database WHERE datname LIKE '%\_%\_%' AND datname NOT IN ('postgres','template0','template1')")
          echo "leftover databases: $leaked"
          test "$leaked" -eq 0

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [e2e-tests, e2e-external]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.e2e-tests.result }}" = "failure" ] || [ "${{ needs.e2e-external.result }}" = "failure" ]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "All E2E tests passed"

      - name: Status check
        run: echo "E2E test suite completed successfully"
