version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: fix(deps)

  - package-ecosystem: gomod
    directory: /cmd/query
    schedule:
      interval: weekly
    commit-message:
      prefix: fix(deps)

  - package-ecosystem: npm
    directory: /cmd/query/www
    schedule:
      interval: weekly
    commit-message:
      prefix: fix(deps)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: fix(deps)
