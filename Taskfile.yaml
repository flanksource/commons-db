version: '3'

vars:
  LOCALBIN: "{{.PWD}}/.bin"
  CONTROLLER_TOOLS_VERSION: v0.16.5
  GOLANGCI_LINT_VERSION: v2.1.6

tasks:
  generate:
    desc: Generate DeepCopy, DeepCopyInto, and DeepCopyObject method implementations
    deps: [controller-gen]
    cmds:
      - "{{.LOCALBIN}}/controller-gen object paths=./types/..."
      - "{{.LOCALBIN}}/controller-gen object paths=./connection/..."
      - "{{.LOCALBIN}}/controller-gen object paths=./models/..."
      - PATH={{.LOCALBIN}}:${PATH} go generate ./...

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  lint:
    desc: Run linters
    deps: [golangci-lint]
    cmds:
      - "{{.LOCALBIN}}/golangci-lint run ./..."
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  test:integration:
    desc: Run tests including DB integration tests (needs COMMONS_DB_URL, or set COMMONS_DB_EMBEDDED_TEST=1)
    cmds:
      - |
        if [ -z "$COMMONS_DB_URL" ] && [ -z "$COMMONS_DB_EMBEDDED_TEST" ]; then
          echo "set COMMONS_DB_URL to an external postgres, or COMMONS_DB_EMBEDDED_TEST=1 to embed one" >&2
          exit 1
        fi
      - go test ./... -timeout 15m

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  build:
    desc: Build all packages
    cmds:
      - go build ./...

  www:install:
    desc: Install the query web UI dependencies (links sibling clicky-ui when present, else npm)
    dir: cmd/query/www
    cmds:
      # --no-frozen-lockfile so the @flanksource/clicky-ui workspace link resolves
      # to the local sibling when checked out, and falls back to the npm range in CI.
      - pnpm install --no-frozen-lockfile

  www:build:
    desc: Build the query web UI into cmd/query/www/dist (embedded by go:embed)
    dir: cmd/query/www
    deps: [www:install]
    cmds:
      - pnpm build

  query:schema:
    desc: Generate per-type/provider source schemas and bundled Clicky UI schemas into schemas/
    dir: cmd/query
    cmds:
      - go run . --profiles-dir ../../.tmp/query-profiles schema --out ../../schemas

  query:build:
    desc: Build the query binary with the embedded web UI
    cmds:
      - make -C cmd/query build

  query:lint:
    desc: Lint the query Go module and web UI
    cmds:
      - make -C cmd/query lint

  query:test:
    desc: Test the query Go module and web UI
    cmds:
      - make -C cmd/query test

  query:dev:
    desc: Run the query app in dev mode — serve spawns a Vite dev server and proxies it (single command)
    deps: [www:install]
    cmds:
      - go -C cmd/query run . serve --dev {{.CLI_ARGS}}

  controller-gen:
    desc: Download controller-gen locally if necessary
    cmds:
      - mkdir -p {{.LOCALBIN}}
      - |
        test -s {{.LOCALBIN}}/controller-gen && {{.LOCALBIN}}/controller-gen --version | grep -q {{.CONTROLLER_TOOLS_VERSION}} || \
        GOBIN={{.LOCALBIN}} go install sigs.k8s.io/controller-tools/cmd/controller-gen@{{.CONTROLLER_TOOLS_VERSION}}
    status:
      - test -s {{.LOCALBIN}}/controller-gen && {{.LOCALBIN}}/controller-gen --version | grep -q {{.CONTROLLER_TOOLS_VERSION}}

  golangci-lint:
    desc: Download golangci-lint locally if necessary
    cmds:
      - mkdir -p {{.LOCALBIN}}
      - test -s {{.LOCALBIN}}/golangci-lint || curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b {{.LOCALBIN}} {{.GOLANGCI_LINT_VERSION}}
    status:
      - test -s {{.LOCALBIN}}/golangci-lint
